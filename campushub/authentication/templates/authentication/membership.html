<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusHub - Join a Club</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-4 font-sans">
    
    <div class="max-w-md w-full">
        <h1 class="text-4xl font-bold mb-4 tracking-tight text-black">Join a Club.</h1>
        <p class="text-gray-600 mb-8 text-lg">
            Please verify your student details and select the organization you wish to join.
        </p>

        {% if messages %}
            <div class="mb-6">
                {% for message in messages %}
                    <div class="alert alert-success bg-green-100 text-green-800 rounded-xl mb-2">
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div class="form-control w-full">
                <label class="label pb-1"><span class="label-text text-base text-gray-800 font-medium">Full Name</span></label>
                {{ form.student_name }}
            </div>

            <div class="flex gap-4">
                <div class="form-control w-1/2">
                    <label class="label pb-1"><span class="label-text text-base text-gray-800 font-medium">Student ID</span></label>
                    {{ form.student_id }}
                </div>
                
                <div class="form-control w-1/2">
                    <label class="label pb-1"><span class="label-text text-base text-gray-800 font-medium">Phone Number</span></label>
                    {{ form.phone_number }}
                </div>
            </div>

            <div class="form-control w-full mt-4">
                <label class="label pb-1"><span class="label-text text-base text-gray-800 font-medium">Select Club</span></label>
                {{ form.club }}
            </div>

            <button type="submit" class="btn bg-black hover:bg-gray-800 text-white w-full rounded-full text-lg mt-6 h-14 border-none">
                Submit Application
            </button>
        </form>
    </div>

</body>
</html>
