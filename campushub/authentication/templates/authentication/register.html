<!DOCTYPE html>
<html>
<head>
    <title>CampusHub - Student Registration</title>
</head>
<body>
    <h2>Sign Up for CampusHub</h2>
    
    {% if messages %}
        <ul>
            {% for message in messages %}
                <li style="color: green;">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register Account</button>
    </form>

</body>
</html>
