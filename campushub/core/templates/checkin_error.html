{% extends 'base.html' %}
{% block title %}Check-in Error{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md text-center">
    <div class="text-red-500 mb-4">
        <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
    </div>
    <h2 class="text-2xl font-bold mb-2">Invalid QR Code</h2>
    <p class="text-gray-600 mb-6">This QR code is invalid or has expired.</p>
    <a href="{% url 'core:feed' %}" class="btn btn-primary w-full">Back to Home</a>
</div>
{% endblock %}
