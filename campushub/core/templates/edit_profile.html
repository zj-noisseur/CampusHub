<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile - CampusHub</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">
    
    <div class="navbar bg-white border-b border-gray-100 px-4 md:px-8 h-20">
        <div class="flex-1">
            <a href="/" class="text-2xl font-bold text-black tracking-tight hover:opacity-80">CampusHub.</a>
        </div>
    </div>

    <div class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold tracking-tight text-black">Profile Settings</h1>
                <a href="{% url 'core:profile' %}" class="btn btn-ghost btn-sm">Cancel</a>
            </div>

            <form method="POST" enctype="multipart/form-data" class="space-y-5">
                {% csrf_token %}

                {% for field in form %}
                    <div class="form-control">
                        <label class="label pb-1" for="{{ field.id_for_label }}">
                            <span class="label-text text-base text-gray-800 font-medium">{{ field.label }}</span>
                        </label>
                        
                        {{ field }}
                        
                        {% if field.help_text %}
                            <label class="label pt-1 pb-0">
                                <span class="label-text-alt text-gray-500">{{ field.help_text|safe }}</span>
                            </label>
                        {% endif %}
                        
                        {% if field.errors %}
                            <label class="label pt-1 pb-0">
                                <span class="label-text-alt text-red-500">{{ field.errors.0 }}</span>
                            </label>
                        {% endif %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn bg-black hover:bg-gray-800 text-white w-full rounded-full text-lg mt-8 h-14 border-none">
                    Save Changes
                </button>
            </form>

        </div>
    </div>

</body>
</html>
