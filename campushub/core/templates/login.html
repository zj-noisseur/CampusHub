<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusHub - Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans">
    
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
        <h1 class="text-3xl font-bold mb-2 tracking-tight text-black">Welcome Back.</h1>
        <p class="text-gray-500 mb-8">Sign in with your student account to join clubs and view your profile.</p>

        {% if form.errors %}
            <div class="alert alert-error bg-red-100 text-red-800 rounded-xl mb-6 text-sm">
                <span>Invalid email or password. Please try again.</span>
            </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div class="form-control w-full">
                <label class="label pb-1"><span class="label-text text-base text-gray-800 font-medium">Email Address</span></label>
                <input type="text" name="username" class="input input-bordered w-full rounded-xl" required>
            </div>

            <div class="form-control w-full">
                <label class="label pb-1"><span class="label-text text-base text-gray-800 font-medium">Password</span></label>
                <input type="password" name="password" class="input input-bordered w-full rounded-xl" required>
            </div>

            <button type="submit" class="btn bg-black hover:bg-gray-800 text-white w-full rounded-full text-lg mt-6 h-14 border-none">
                Sign In
            </button>
        </form>
        
        <p class="text-center mt-6 text-gray-500">
            Don't have an account? <a href="{% url 'sign_up' %}" class="text-black font-bold hover:underline">Register here</a>.
        </p>
    </div>

</body>
</html>
