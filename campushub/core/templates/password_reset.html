<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CampusHub</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FAFAFA; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <<div class="max-w-lg w-full mx-auto bg-white p-8 md:p-10 rounded-3xl border border-gray-100 shadow-sm text-center">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Reset your password</h1>
        <p class="text-gray-500 mb-8 text-sm">Enter the email address associated with your CampusHub account, and we'll send you a link to reset your password.</p>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="form-control w-full">
                <input type="email" name="email" value="{{ user.email|default:'' }}" placeholder="student@student.mmu.edu.my" class="input input-bordered w-full bg-gray-50 text-black focus:border-blue-500" required>
            </div>

            <button type="submit" class="btn bg-black hover:bg-gray-800 text-white w-full rounded-full border-none mt-2">
                Send Reset Link
            </button>
        </form>
        
        <div class="mt-6">
            {% if user.is_authenticated %}
                <a href="{% url 'core:profile' %}" class="text-sm font-medium text-gray-500 hover:text-black transition-colors">
                    Back to Account Settings
                </a>
            {% else %}
                <a href="{% url 'core:login' %}" class="text-sm font-medium text-gray-500 hover:text-black transition-colors">
                    Back to Login
                </a>
            {% endif %}
        </div>
    </div>

</body>
</html>
