{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reset Your CampusHub Password</title>
</head>
<body style="font-family: sans-serif; background-color: #f9fafb; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 12px; border: 1px solid #e5e7eb;">
        <h2 style="color: #111827; margin-bottom: 10px;">Password Reset Request</h2>
        <p style="color: #4b5563; font-size: 16px; line-height: 1.5;">
            We received a request to reset the password for your CampusHub account associated with <strong>{{ email }}</strong>.
        </p>
        
        <div style="margin: 30px 0; text-align: center;">
            <a href="{{ protocol }}://{{ domain }}{% url 'core:password_reset_confirm' uidb64=uid token=token %}" 
               style="background-color: #000000; color: #ffffff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; display: inline-block;">
                Reset Password
            </a>
        </div>
        
        <p style="color: #9ca3af; font-size: 14px;">
            If you didn't request this, you can safely ignore this email. This link will expire in 3 days.
        </p>
    </div>
</body>
</html>
