{% extends 'base.html' %}

{% block content %}
<div class="min-h-[calc(100vh-5rem)] flex items-center justify-center bg-base-100 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-sm border border-gray-100">
        
        <div class="text-center">
            <h2 class="text-3xl font-bold text-gray-900">Resend Activation</h2>
            <p class="mt-2 text-sm text-gray-500">
                Didn't receive your email? Enter your student email below and we'll send you a fresh link.
            </p>
        </div>

        <form class="mt-8 space-y-6" action="{% url 'core:resend_activation' %}" method="POST">
            {% csrf_token %}
            
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-medium text-gray-700">Student Email</span>
                </label>
                <input type="email" name="email" required placeholder="student@mmu.edu.my" 
                       class="input input-bordered w-full bg-gray-50 focus:bg-white transition-colors rounded-xl" />
            </div>

            <!-- Match Sign In Button Color Exactly -->
            <button type="submit" class="btn border-none bg-black text-white hover:bg-gray-900 w-full rounded-xl font-bold shadow-md hover:scale-[1.02] transition-transform">
                Send New Link
            </button>
        </form>

        <!-- Back to Login (Arrow Removed) -->
        <div class="text-center mt-6">
            <a href="{% url 'core:login' %}" class="text-sm font-medium text-gray-500 hover:text-black transition-colors">
                Back to Login
            </a>
        </div>

    </div>
</div>
{% endblock %}
