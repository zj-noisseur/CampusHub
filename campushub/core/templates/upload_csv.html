<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload CSV - CampusHub</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen p-8 flex items-center justify-center">

    <div class="max-w-xl w-full">
        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <h2 class="card-title text-2xl mb-2">Upload Attendee CSV</h2>
                <p class="text-gray-500 mb-6">Upload the spreadsheet containing your event attendees to generate their certificates.</p>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <label class="form-control w-full mb-6">
                        <div class="label"><span class="label-text font-bold">Select CSV File</span></div>
                        <input type="file" name="csv_file" accept=".csv" class="file-input file-input-bordered file-input-info w-full" required />
                    </label>

                    <div class="flex justify-end gap-3">
                        <a href="javascript:history.back()" class="btn btn-ghost">Cancel</a>
                        <button type="submit" class="btn btn-info">Next Step &rarr;</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
