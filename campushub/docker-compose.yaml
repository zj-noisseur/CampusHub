version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: ./Dockerfile
    command: gunicorn campushub.wsgi:application --bind 0.0.0.0:8000
    expose:
      - 8000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ML_BACKEND_URL=${ML_BACKEND_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
      - USE_S3=True
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: ./Dockerfile
    command: celery -A campushub worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ML_BACKEND_URL=${ML_BACKEND_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
      - USE_S3=True
    restart: always
